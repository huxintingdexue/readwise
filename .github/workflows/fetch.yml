name: Fetch Articles

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      initial_fetch:
        description: 'Set to 3 for first-time bootstrap (optional)'
        required: false
        default: ''

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run fetch script
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          INITIAL_FETCH: ${{ github.event.inputs.initial_fetch || '' }}
        run: node scripts/fetch-articles.js
