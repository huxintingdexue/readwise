<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f1115" />
    <link rel="manifest" href="/manifest.json" />
    <title>今日硅谷</title>
    <link rel="stylesheet" href="/css/reader.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-title">
          <h1>今日硅谷</h1>
          <p>直连硅谷，一手信息触手可及</p>
        </div>
        <div class="topbar-actions">
          <button id="themeToggle" class="icon-btn theme-toggle" type="button" aria-label="切换主题">☀️</button>
          <button id="filterToggle" class="icon-btn" type="button" aria-label="筛选">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 5h18l-7 8v5l-4 2v-7L3 5z" fill="currentColor"></path>
            </svg>
          </button>
        </div>
      </header>

      <div id="filterPanel" class="filter-panel hidden" aria-label="筛选面板">
        <label>
          状态
          <select id="statusFilter">
            <option value="">全部</option>
            <option value="unread">未读</option>
            <option value="read">已读</option>
            <option value="archived">存档</option>
          </select>
        </label>

        <label>
          作者
          <select id="authorFilter">
            <option value="">全部</option>
            <option value="sam">Sam Altman</option>
            <option value="andrej">Andrej Karpathy</option>
            <option value="peter">Peter Steipete</option>
            <option value="lenny">Lenny Rachitsky</option>
            <option value="naval">Naval Ravikant</option>
          </select>
        </label>

        <label>
          排序
          <select id="sortFilter">
            <option value="date_desc">时间倒序</option>
            <option value="date_asc">时间正序</option>
          </select>
        </label>
      </div>

      <main>
        <section id="tab-today" class="tab-panel">
          <div id="articlesState" class="state-text">加载中...</div>
          <ul id="articlesList" class="articles-list"></ul>
        </section>

        <section id="tab-notes" class="tab-panel hidden">
          <div class="notes-section">
            <h2>划线与问答</h2>
            <div id="notesList" class="notes-list"></div>
          </div>
          <div class="notes-section">
            <h2>书单</h2>
            <div id="readingList" class="reading-list"></div>
          </div>
        </section>

        <section id="readerView" class="reader hidden" aria-live="polite">
          <!-- title/meta kept in DOM (used by JS) but not shown in header -->
          <h2 id="readerTitle" style="display:none">阅读中</h2>
          <p id="readerMeta" style="display:none"></p>
          <header class="reader-header">
            <button id="backBtn" class="back-btn" type="button" aria-label="返回">
              <span aria-hidden="true">←</span>
            </button>
            <div class="reader-header-right">
              <button id="articleNotesBtn" class="header-icon-btn" type="button" aria-label="本文划线">
                <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" fill="currentColor">
                  <path d="M7 14l6-6 3 3-6 6H7v-3z"/>
                  <path d="M5 19h14v2H5z"/>
                </svg>
              </button>
            </div>
          </header>
          <div id="referenceBanner" class="reference-banner hidden">
            <div id="referenceBannerText" class="reference-banner-text"></div>
            <div class="reference-banner-actions">
              <button id="referenceAddBtn" type="button">加入阅读列表</button>
              <button id="referenceDismissBtn" type="button">忽略</button>
            </div>
          </div>
          <article id="readerContent" class="reader-content"></article>
        </section>
      </main>
      <nav class="bottom-nav" aria-label="主导航">
        <button class="tab-btn is-active" data-tab="today" type="button">
          <span class="tab-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M4 11l8-7 8 7v8a1 1 0 0 1-1 1h-5v-5H10v5H5a1 1 0 0 1-1-1z" fill="currentColor"></path>
            </svg>
          </span>
          <span class="tab-label">今日</span>
        </button>
        <button class="tab-btn" data-tab="notes" type="button">
          <span class="tab-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M6 4h9l5 5v11a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1zm8 1v4h4" fill="currentColor"></path>
              <path d="M8 12h8v2H8zm0 4h8v2H8z" fill="currentColor"></path>
            </svg>
          </span>
          <span class="tab-label">笔记</span>
        </button>
      </nav>
    </div>

    <div id="longPressMenu" class="long-press-menu hidden">
      <button data-action="mark-read" type="button">标记已读</button>
      <button data-action="archive" type="button">存档</button>
      <button data-action="cancel-archive" type="button">取消存档</button>
    </div>

    <div id="toast" class="toast hidden"></div>
    <aside id="originSnippet" class="origin-snippet hidden" aria-live="polite">
      <div class="origin-snippet-head">
        <strong>英文原文片段</strong>
        <button id="closeOriginSnippet" type="button">关闭</button>
      </div>
      <pre id="originSnippetText"></pre>
    </aside>

    <aside id="articleNotesPanel" class="notes-panel hidden" aria-live="polite">
      <div class="notes-panel-head">
        <button id="closeArticleNotes" class="back-btn" type="button" aria-label="返回">←</button>
        <strong>本文划线</strong>
      </div>
      <div id="articleNotesBody" class="notes-panel-body"></div>
    </aside>

    <div id="qaModal" class="qa-modal hidden" role="dialog" aria-modal="true">
      <div class="qa-sheet">
        <div class="qa-sheet-head">
          <strong>AI 问答</strong>
          <button id="qaCloseBtn" type="button" aria-label="关闭">✕</button>
        </div>
        <div id="qaChatBody" class="qa-chat-body"></div>
        <div class="qa-input-bar">
          <textarea id="qaQuestionInput" rows="2" placeholder="输入你的问题..."></textarea>
          <button id="qaSubmitBtn" type="button">发送</button>
        </div>
        <div id="qaError" class="qa-error"></div>
      </div>
    </div>

    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(() => {});
      }
    </script>
    <script type="module" src="/js/app.js"></script>
  </body>
</html>
