<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>今日硅谷 分享页</title>
    <meta name="description" content="ReadWise 精选文章分享" />
    <link rel="stylesheet" href="/frontend/css/share.css" />
  </head>
  <body>
    <main class="share-shell">
      <section class="share-card">
        <header class="share-head">
          <p class="share-brand">今日硅谷</p>
          <h1 id="shareTitle">加载中...</h1>
          <p id="shareMeta" class="share-meta"></p>
          <p id="shareSummary" class="share-summary hidden"></p>
        </header>

        <article id="shareContent" class="share-content">
          <p>正在加载文章内容...</p>
        </article>

        <footer class="share-footer">
          <a id="openOriginalLink" class="ghost-link hidden" target="_blank" rel="noopener noreferrer">查看原文</a>
          <button id="copyShareBtn" type="button">复制链接</button>
        </footer>
      </section>
    </main>

    <aside id="shareCta" class="share-cta hidden" aria-live="polite">
      <div class="share-cta-text">
        <strong>阅读更多精选？</strong>
        <span id="shareCtaSub">每天更新硅谷圈大佬最新动态和文章</span>
      </div>
      <button id="shareCtaBtn" type="button">立即下载</button>
    </aside>

    <div id="shareGuide" class="share-guide hidden" role="dialog" aria-modal="true">
      <div class="share-guide-card">
        <strong id="shareGuideTitle">如何继续安装</strong>
        <p id="shareGuideText">点击右上角“...”选择用浏览器打开。</p>
        <button id="shareGuideClose" type="button">知道了</button>
      </div>
    </div>

    <div id="shareToast" class="share-toast hidden"></div>
    <script type="module" src="/frontend/js/share.js"></script>
  </body>
</html>
